<script>
(function(){
  const AFF_URL = 'https://soscrescimento.com.br/braip/?pv=prov6q42&af=afixjmn7om';
  let clickFired = false;

  // 1) Cria link trackable invisível
  const realLink = document.createElement('a');
  realLink.href = AFF_URL + window.location.search;
  realLink.target = '_self';
  realLink.className = 'ratoeira-trackable';
  realLink.style.display = 'none';
  document.body.appendChild(realLink);

  // 2) Função de redirect
  function doRedirect(){
    if (clickFired) return;
    clickFired = true;
    realLink.click();
  }

  // 3) Mostra popup
  function showPopup(){
    const popup = document.getElementById('age-verification-popup-modern');
    if (popup) {
      popup.style.display = 'flex';
      popup.classList.add('age-popup-visible-modern');
    }
  }

  // 4) Inicializa botões de idade
  function initPopup(){
    showPopup();

    const ageButtons = document.querySelectorAll('.age-btn-modern');
    ageButtons.forEach(button => {
      button.addEventListener('click', function(e){
        e.preventDefault();
        doRedirect();
      });
    });
  }

  // 5) Listener global de clique (bubbling!)
  document.body.addEventListener('click', (e) => {
    if (clickFired) return;

    // se clicou em botão de idade, ignora (já tem handler próprio)
    if (e.target.closest('.age-btn-modern')) {
      return;
    }
    // qualquer outro clique dispara
    doRedirect();
  });

  // 6) Escuta ESC / Enter / Space
  document.addEventListener('keydown', (e) => {
    if (clickFired) return;
    if (['Escape','Enter',' '].includes(e.key)){
      doRedirect();
    }
  });

  // 7) Inicia
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initPopup);
  } else {
    initPopup();
  }
})();
</script>
